<script>

/* =========================
   SECTION SWITCHING
========================= */
function showSection(id){
  document.querySelectorAll('section').forEach(sec=>sec.classList.remove('active'));
  const section = document.getElementById(id);
  section.classList.add('active');

  if(id === "network"){
      setTimeout(renderNetwork, 100); // render AFTER visible
  }
}

/* =========================
   TIMELINE
========================= */
const timelineData={
"1930s":"Emergence of intensified emotional vocabulary and devotional framing.",
"1940s":"Heightened theological reflection and wartime introspection.",
"1950s":"Stabilised devotional tone and intellectual consolidation.",
"1960s":"Late retrospective framing and legacy consciousness."
};

function setDecade(decade){
  document.getElementById('timelineContent').innerText=timelineData[decade];
}

/* =========================
   TOPIC CHART
========================= */
new Chart(document.getElementById('topicChart'),{
  type:'line',
  data:{
    labels:['1930s','1940s','1950s','1960s'],
    datasets:[
      {label:'Religion',data:[4,8,7,5],borderWidth:3},
      {label:'Love & Intimacy',data:[7,6,4,2],borderWidth:3}
    ]
  }
});

/* =========================
   SENTIMENT ANALYSIS
========================= */

const sentimentData = {
  labels:["Letter 1","Letter 2","Letter 3","Letter 4","Letter 5"],
  values:[0.6,0.8,0.3,0.7,0.5]  // mock polarity scores
};

const sentimentCanvas = document.createElement("canvas");
sentimentCanvas.id = "sentimentChart";
document.getElementById("analysis").appendChild(sentimentCanvas);

new Chart(sentimentCanvas,{
  type:'bar',
  data:{
    labels:sentimentData.labels,
    datasets:[{
      label:"Sentiment Polarity",
      data:sentimentData.values
    }]
  }
});

/* =========================
   WORD COUNT INTERACTIVE
========================= */

const wordCountData = {
  "1930s":[1200,1500,980],
  "1940s":[1600,1700,1400],
  "1950s":[1100,1300,1250],
  "1960s":[900,850,1000]
};

const wordMenu = document.createElement("div");
wordMenu.innerHTML = `
<h3>Word Count per Letter</h3>
<select id="decadeSelect">
<option value="1930s">1930s</option>
<option value="1940s">1940s</option>
<option value="1950s">1950s</option>
<option value="1960s">1960s</option>
</select>
<canvas id="wordChart"></canvas>
`;

document.getElementById("analysis").appendChild(wordMenu);

let wordChart = new Chart(document.getElementById("wordChart"),{
  type:'bar',
  data:{
    labels:["Letter A","Letter B","Letter C"],
    datasets:[{
      label:"Word Count",
      data:wordCountData["1930s"]
    }]
  }
});

document.getElementById("decadeSelect").addEventListener("change",function(){
  const decade = this.value;
  wordChart.data.datasets[0].data = wordCountData[decade];
  wordChart.update();
});

/* =========================
   NETWORK FIXED RENDER
========================= */

let networkRendered = false;

function renderNetwork(){

  if(networkRendered) return;

  const container = document.getElementById('networkGraph');
  const width = container.clientWidth;
  const height = 600;

  const svg = d3.select(container).append('svg')
      .attr('width',width)
      .attr('height',height);

  const nodes=[
    {id:'Eliot'},
    {id:'Emily Hale'},
    {id:'Vivienne Eliot'},
    {id:'Anglican Church'},
    {id:'Dante'}
  ];

  const links=[
    {source:'Eliot',target:'Emily Hale'},
    {source:'Eliot',target:'Vivienne Eliot'},
    {source:'Eliot',target:'Anglican Church'},
    {source:'Eliot',target:'Dante'}
  ];

  const simulation=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(150))
    .force('charge',d3.forceManyBody().strength(-400))
    .force('center',d3.forceCenter(width/2,height/2));

  svg.selectAll('line')
    .data(links)
    .enter().append('line')
    .attr('stroke','#999');

  const tooltip=d3.select('#tooltip');

  const node=svg.selectAll('circle')
    .data(nodes)
    .enter().append('circle')
    .attr('r',14)
    .attr('fill','#1b263b')
    .call(d3.drag()
      .on('start',(event,d)=>{
        if(!event.active) simulation.alphaTarget(0.3).restart();
        d.fx=d.x; d.fy=d.y;
      })
      .on('drag',(event,d)=>{
        d.fx=event.x; d.fy=event.y;
      })
      .on('end',(event,d)=>{
        if(!event.active) simulation.alphaTarget(0);
        d.fx=null; d.fy=null;
      })
    )
    .on('mouseover',(event,d)=>{
      tooltip.style('opacity',1)
      .style('left',event.pageX+10+'px')
      .style('top',event.pageY-10+'px')
      .html(d.id);
    })
    .on('mouseout',()=>tooltip.style('opacity',0));

  const labels=svg.selectAll('text')
    .data(nodes)
    .enter().append('text')
    .text(d=>d.id)
    .attr('font-size','14px')
    .attr('dx',18)
    .attr('dy','.35em');

  simulation.on('tick',()=>{
    svg.selectAll('line')
      .attr('x1',d=>d.source.x)
      .attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x)
      .attr('y2',d=>d.target.y);

    node.attr('cx',d=>d.x).attr('cy',d=>d.y);
    labels.attr('x',d=>d.x).attr('y',d=>d.y);
  });

  networkRendered = true;
}

</script>
